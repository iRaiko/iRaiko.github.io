<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iRaiko Paper Match</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="settings-card">
        <p class="settings-card__intro">Settings are saved automatically as you edit them.</p>

        <form id="settingsForm" class="settings-form" autocomplete="off">
          <div class="field-grid">
            <div class="field-group">
              <label for="roundTime">Round time (seconds)</label>
              <input type="number" id="roundTime" name="roundTime" min="10" max="180" step="5" value="60">
            </div>

            <div class="field-group field-group--inline">
              <label for="chillMode" class="chill-label">
                <div class="toggle-wrap">
                  <input type="checkbox" id="chillMode" name="chillMode">
                  <span class="toggle-ui" aria-hidden="true"></span>
                </div>
                Chill mode
              </label>
            </div>

            <div class="field-group">
              <label for="gridSize">Grid size</label>
              <input type="number" id="gridSize" name="gridSize" min="2" max="20" step="1" value="5">
            </div>
          </div>

          <fieldset class="field-group">
            <legend>Subtypes</legend>
            <div id="options" class="options-grid"></div>
          </fieldset>

          <div class="field-group">
            <button type="button" id="start" class="action-button">Start game</button>
          </div>
        </form>
      </section>

      <section class="game-screen hidden" id="gameScreen" aria-live="polite">
        <div class="game-panel game-panel--left">
          <button type="button" id="quitRun" class="secondary-button">Quit run</button>
          <div class="game-status">
            <div class="game-metric">
              <span class="metric-label">Score</span>
              <span class="metric-value" id="scoreValue">0</span>
            </div>
            <div class="game-metric">
              <span class="metric-label">Time</span>
              <span class="metric-value" id="timerValue">--</span>
            </div>
          </div>
        </div>

        <div class="game-panel game-panel--center">
          <div class="game-table" id="gameTable">
            <p class="game-table__placeholder">Game table will appear here.</p>
          </div>
        </div>

        <div class="game-panel game-panel--right">
          <div class="trashcan" role="button" tabindex="0" aria-label="Trash bin">🗑️</div>
          <p class="trash-label">Trash</p>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
